<h1>Каспийское море</h1>
<p>Каспийское море — крупнейший внутренний водоём на Земле. Оно расположено между Европой и Азией.</p>
<p>Оно образовалось из древнего океана, который со временем отделился и уменьшился.</p>
<p>Сегодня Каспийское море важно из-за запасов нефти и газа, а также уникальных видов животных.</p>
