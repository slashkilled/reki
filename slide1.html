<p>Мёртвое море — одно из самых солёных водоёмов в мире, расположенное между Израилем и Иорданией.</p>
<p>Оно образовалось миллионы лет назад в тектонической впадине, куда поступает вода, но не вытекает.</p>
<p>Сегодня море уменьшается, но остаётся важным природным объектом.</p>
