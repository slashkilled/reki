<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Презентация про моря</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#eaeaea;
  font-family:'Roboto Mono', monospace;
  text-align:center;
}
.container{
  max-width:900px;
  margin:0 auto;
  padding:40px 20px;
}
h1{
  font-size:65px;
  margin-bottom:20px;
}
p{
  color:#ccc;
  font-size:20px;
  line-height:1.7;
  margin-bottom:20px;
  font-weight:700;
}
.images{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:25px;
  flex-wrap:wrap;
}
.images img{
  width:260px;
  border-radius:6px;
}
.start{
  display:inline-block;
  margin-top:30px;
  padding:25px 70px;
  font-size:28px;
  text-decoration:none;
  color:#eaeaea;
  background:#111;
  border:2px solid #888;
  border-radius: 60% 40% 60% 40% / 40% 60% 40% 60%;
  transition:0.3s;
}
.start:hover{
  border-color:#fff;
  color:#fff;
  background:#1a1a1a;
}
@media(max-width:768px){
  h1{font-size:45px;}
  p{font-size:16px;}
  .images{
    flex-direction:column;
    align-items:center;
  }
  .images img{
    width:90%;
  }
  .start{
    padding:20px 50px;
    font-size:24px;
  }
}
</style>
</head>
<body>
<div class="container">
  <h1>Привет!</h1>
  <p>Сегодня я расскажу о трёх необычных морях: Мёртвом, Каспийском и Аральском.</p>
  <p>Вы узнаете, как они образовались и что с ними происходило со временем.</p>
  <div class="images">
    <img src="https://madan.org.il/sites/default/files/field/image/bolan1.jpg" alt="Мёртвое море">
    <img src="https://casp-geo.ru/wp-content/uploads/2019/06/250619-1-1024x684.jpg" alt="Каспийское море">
    <img src="https://gde.kg/uploads/posts/2025-02/aral.jpg" alt="Аральское море">
  </div>
  <a href="slide1.html" class="start">В плаванье</a>
</div>
</body>
</html>
